{% set name = "formulaic" %}
{% set version = "1.2.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: c99e8f11ff7d327eaecaf63855ca69b7fa0da100ad6c0041ef80912fbac667e6

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - interface_meta >=1.2
    - narwhals >=1.17
    - numpy >=1.20
    - pandas >=1.3
    - scipy >=1.6
    - typing-extensions >=4.2
    - wrapt >=1.17
  run_constrained:
    - polars >=1
    - pyarrow >=1
    - sympy >=1.3,!=1.10

test:
  requires:
    - python {{ python_min }}
    - polars
    - pyarrow
    - sympy
  imports:
    - formulaic

about:
  home: https://github.com/matthewwardrop/formulaic
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: A high-performance implementation of Wilkinson formulas for Python.
  description: |
    Formulaic is a high-performance implementation of Wilkinson formulas for Python.
  doc_url: https://matthewwardrop.github.io/formulaic
  dev_url: https://github.com/matthewwardrop/formulaic

extra:
  recipe-maintainers:
    - matthewwardrop
